# ========== Mouse Cursor Auto Hiding ==========
cursor-autohide=200 # Mouse cursor auto-hide timeout (ms)
cursor-autohide-fs-only=yes # Hide only in fullscreen

# ========== Terminal Messaging ==========
msg-color=yes # Color terminal output
msg-module=yes # Show module name on each terminal line
term-osd-bar=yes # Show progress bar at the bottom of terminal output

# ========== Window ==========
ontop=yes # Keep window always on top by default
border=no # Show native title bar
keep-open=yes # Keep window open even when no file is played
force-window=yes # Show window even for audio-only files
snap-window=yes # Snap window to screen edges
idle=yes # Stay idle instead of quitting when no file is loaded

# ========== OSD UI ==========
osd-bar=no # Using uosc, so disable native OSD bar
osd-border-color='#FF000000' # ARGB
osd-border-size=1.2
osd-color='#FFFFFFFF' # ARGB
osd-duration=3000 # OSD display duration (ms)
osd-fractions=yes # Show milliseconds in OSD timestamps
osd-font-size=20 # OSD font size
osd-font='Sarasa Mono J'
osd-level=2
osd-msg2="${osd-sym-cc} ${osd-ass-cc/0}{\\fnIosevka}${time-pos/full:-} / ${duration/full:-} (${percent-pos:-}%)\n  Byte:     ${stream-pos:-} / ${=stream-end:-}\n  Frame:    ${video-frame-info/picture-type:-} ${estimated-frame-number:-} / ${estimated-frame-count:-} (Drop ${decoder-frame-drop-count:-} dec / ${frame-drop-count:-} vo)\n  Bitrate:  V ${user-data/real-v-bitrate:-} / A ${user-data/real-a-bitrate:-} / S ${sub-bitrate:-}\n"

# ========== Video Decoding ==========
vo=gpu-next # Default is gpu-next
vulkan-device=8680a646-0c00-0000-0002-000000000000 # Intel Iris Xe Graphics (explicit)
gpu-context=waylandvk
gpu-api=vulkan # vulkan or opengl
hwdec=vulkan,nvdec,vaapi,auto-safe,auto,no # vulkan or nvdec or vaapi, fallback to auto-safe or auto
hwdec-extra-frames=30 # Pre-allocate GPU frames
scale=ewa_lanczos4sharpest
deband=yes
interpolation=yes # Compensate for refresh rate mismatch stutter
# VSync method
#   audio=Sync video to audio, high stability
#   display-resample=Sync audio to video, not recommended (audio pitch shifts)
video-sync=audio



# ========== Audio Decoding ==========

# Audio delay (seconds)
audio-delay=0.00
# Audio output driver (pipewire or pulseaudio)
ao=pipewire
# Auto pitch correction when playback speed changes
audio-pitch-correction=yes
# Maximum volume
volume-max=200
# Default volume
volume=100



# ========== Subtitle Decoding ==========

# Subtitle font (may be overridden by subtitles)
sub-font='FOT-ロダンNTLG Pro DB'



# ========== Data Caching ==========

# Enable cache
cache=yes
# Pause when cache runs low (buffering)
cache-pause=yes
# Buffer before starting playback
cache-pause-initial=yes
# Buffering threshold (seconds)
cache-pause-wait=1
# Maximum forward demuxer cache
demuxer-max-bytes=1024MiB
# Maximum backward demuxer cache
demuxer-max-back-bytes=512MiB



# ========== Network ==========

# User-Agent string for remote access
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36"



# ========== Demultiplex ==========

# lavf (libavformat) options
demuxer-lavf-o=protocol_whitelist=[file,crypto,data,tcp,tls,http,https]
# ytdl format preference
ytdl-format="bestvideo*+bestaudio/best"



# ========== Seeking ==========

# Force seeking even when not normally seekable
force-seekable=yes



# ========== HLS ==========

# HLS bitrate limit
hls-bitrate=max
# Prefetch HLS manifests
prefetch-playlist=yes



# ========== Script Opts ==========

# ytdl path
script-opts=ytdl_hook-ytdl_path=yt-dlp



# ========== Track Selecting ==========

# Preferred audio/video languages (highest priority first)
alang=ja-jp,jpn,ja,jp,eng,en,und
vlang=ja-jp,jpn,ja,jp,eng,en,und



# ========== Looping ==========

# Loop playback
loop-file=inf



# ========== Screenshot ==========

# Screenshot format
screenshot-format=png
# Screenshot save directory
screenshot-dir=~/Pictures/mpv
# Screenshot filename template
screenshot-template=mpv_%F_%n
# PNG compression level
screenshot-png-compression=5



# ========== Audio Pitch Speed ==========

# Optional pitch change filter definition
af=@pitchrb:!rubberband

# Auto pitch correction profile definition
# Referenced when audio-pitch-correction=yes
[af_insert]
  # Condition for profile activation (speed != 1)
  profile-cond=speed ~= 1
  # Restore settings when profile is disabled
  profile-restore=copy
  # Profile content
  # Insert audio filter (rubberband=high quality, scaletempo2=low load)
  af-add=@speedrb:rubberband





[nvidia]
vo=gpu-next
vulkan-device="NVIDIA GeForce RTX 3070 Ti Laptop GPU"
gpu-context=waylandvk
gpu-api=vulkan # vulkan or opengl
hwdec=vulkan,nvdec,vaapi,auto-safe,auto,no # vulkan or nvdec or vaapi, fallback to auto-safe or auto
