<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
 <selectfont>
  <rejectfont>
   <!-- FUCK MS GOTHIC / MS MINCHO 🖕 -->
   <glob>/usr/local/share/fonts/WindowsFonts/msgothic.ttc</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/msmincho.ttc</glob>
   <!-- FUCK Windows JP Fonts -->
   <glob>/usr/local/share/fonts/WindowsFonts/meiryo*</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/YuGoth*.ttc</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/yumin*.ttf</glob>
   <!-- FUCK Segoe UI -->
   <glob>/usr/local/share/fonts/WindowsFonts/segoeui*.ttf</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/seguibl*.ttf</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/seguihis*.ttf</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/seguili*.ttf</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/seguisb*.ttf</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/seguisli*.ttf</glob>
   <!-- avoid conflict (Noto CJK is already installed in Linux) -->
   <glob>/usr/local/share/fonts/WindowsFonts/NotoSansCJK*-*</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/NotoSans*-*</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/NotoSerifCJK*-*</glob>
   <glob>/usr/local/share/fonts/WindowsFonts/NotoSerif*-*</glob>
  </rejectfont>
 </selectfont>
 <match target="pattern">
  <test name="family" qual="any">
   <string>sans-serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Inter</string>
   <string>LINE Seed JP_OTF</string>
   <string>Noto Sans CJK JP</string>
   <string>Noto Color Emoji</string>
  </edit>
 </match>
 <match target="pattern">
   <test name="family" qual="any">
     <string>Liberation Sans</string>
   </test>
   <edit binding="strong" mode="prepend" name="family">
     <string>sans-serif</string>
   </edit>
 </match>
 <match target="pattern">
   <test name="family" qual="any">
     <string>Arial</string>
   </test>
   <edit binding="strong" mode="prepend" name="family">
     <string>sans-serif</string>
   </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>system-ui</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Inter</string>
   <string>LINE Seed JP_OTF</string>
   <string>Noto Sans CJK JP</string>
   <string>Noto Color Emoji</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>screen-ui</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Inter</string>
   <string>LINE Seed JP_OTF</string>
   <string>Noto Sans CJK JP</string>
   <string>Noto Color Emoji</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>serif</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Hiragino Serif Pr6N</string>
   <string>Hiragino Mincho ProN</string>
   <string>Hiragino Mincho StdN</string>
   <string>A-OTF Ryumin Pr6N</string>
   <string>Noto Serif CJK JP</string>
   <string>Noto Color Emoji</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family" qual="any">
   <string>monospace</string>
  </test>
  <edit binding="strong" mode="prepend" name="family">
   <string>Iosevka</string>
   <string>HackLine</string>
   <string>GenEi Mono Gothic</string>
   <string>Sarasa Code J</string>
   <string>Noto Sans Mono CJK JP</string>
   <string>Noto Sans CJK JP</string>
   <string>Noto Color Emoji</string>
  </edit>
 </match>
 <!-- Artificial oblique for fonts without an italic or oblique version -->
 <match target="font">
  <!-- check to see if the font is roman -->
  <test name="slant">
   <const>roman</const>
  </test>
  <!-- check to see if the pattern requested non-roman -->
  <test compare="not_eq" name="slant" target="pattern">
   <const>roman</const>
  </test>
  <!-- multiply the matrix to slant the font -->
  <edit mode="assign" name="matrix">
   <times>
    <name>matrix</name>
    <matrix>
     <double>1</double>
     <double>0.2</double>
     <double>0</double>
     <double>1</double>
    </matrix>
   </times>
  </edit>
  <!-- pretend the font is oblique now -->
  <edit mode="assign" name="slant">
   <const>oblique</const>
  </edit>
  <!-- and disable embedded bitmaps for artificial oblique -->
  <edit mode="assign" name="embeddedbitmap">
   <bool>false</bool>
  </edit>
 </match>
 <!-- Synthetic emboldening for fonts that do not have bold face available -->
 <match target="font">
  <!-- check to see if the weight in the font is less than medium which possibly need emboldening -->
  <test compare="less_eq" name="weight">
   <const>medium</const>
  </test>
  <!-- check to see if the pattern requests bold -->
  <test compare="more_eq" name="weight" target="pattern">
   <const>bold</const>
  </test>
  <!--
		  set the embolden flag
		  needed for applications using cairo, e.g. gucharmap, gedit, ...
		-->
  <edit mode="assign" name="embolden">
   <bool>true</bool>
  </edit>
  <!--
		 set weight to bold
		 needed for applications using Xft directly, e.g. Firefox, ...
		-->
  <edit mode="assign" name="weight">
   <const>bold</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <dir>~/.local/share/fonts</dir>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>none</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>vbgr</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>vrgb</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>bgr</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintfull</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintmedium</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>false</bool>
  </edit>
 </match>
  <match target="font">
   <edit mode="assign" name="hintstyle">
    <const>hintnone</const>
   </edit>
  </match>
</fontconfig>